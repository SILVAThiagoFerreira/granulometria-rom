<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Granulometria ROM · US Vale Verde</title>
  <link rel="preconnect" href="https://docs.google.com">
  <link rel="stylesheet" href="./styles.css?v=4">
</head>
<body>
  <header class="topbar">
    <div class="topbar__left">
      <img class="topbar__logo" src="./assets/openblast-logo.png" alt="OpenBlast">
      <span class="topbar__title">Granulometria ROM</span>
    </div>
    <div class="filters">
      <select id="filter-year" class="filter-select"><option value="">Ano</option></select>
      <select id="filter-month" class="filter-select"><option value="">Mes</option></select>
      <select id="filter-bench" class="filter-select"><option value="">Banco</option></select>
      <select id="filter-plan" class="filter-select"><option value="">Plano</option></select>
      <button id="filter-reset" type="button" class="filter-reset">Limpar</button>
    </div>
  </header>

  <main class="page">
    <p class="status" id="status" aria-live="polite">
      <span class="status__dot" id="status-dot"></span>
      <span id="status-text">Carregando...</span>
      <span class="status__spacer"></span>
      <span class="status__time" id="last-update"></span>
    </p>

    <div class="active-filters" id="active-filters" style="display:none"></div>

    <section class="kpis">
      <div class="kpi">
        <p class="kpi__label">Desmontes</p>
        <p class="kpi__value" id="kpi-count">--</p>
        <p class="kpi__sub" id="kpi-count-hint">&nbsp;</p>
      </div>
      <div class="kpi">
        <p class="kpi__label">D80 medio</p>
        <p class="kpi__value" id="kpi-d80">--</p>
        <p class="kpi__sub">Meta &le; 400 mm</p>
      </div>
      <div class="kpi">
        <p class="kpi__label">Conformidade</p>
        <p class="kpi__value" id="kpi-conf">--</p>
        <p class="kpi__sub" id="kpi-conf-hint">--</p>
      </div>
      <div class="kpi">
        <p class="kpi__label">Massa</p>
        <p class="kpi__value" id="kpi-mass">--</p>
        <p class="kpi__sub" id="kpi-mass-hint">--</p>
      </div>
    </section>

    <div class="chart-tile">
      <h3 class="chart-label">Curva granulometrica media</h3>
      <div class="chart-box"><canvas id="chart-curve"></canvas></div>
    </div>

    <div class="chart-tile" style="margin-top:10px">
      <h3 class="chart-label">Evolucao mensal — todos os percentis</h3>
      <div class="chart-box chart-box--tall"><canvas id="chart-trend-all"></canvas></div>
    </div>

    <p class="source-note">Fonte: Planilha Google Sheets da operacao US Vale Verde</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="./app.js?v=4"></script>
</body>
</html>
